<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La tienda de Pily</title>

  <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body>
  <div class="grid-container">

    <nav>
      <h1>La tienda de Pily</h1>
      <p>Ropa usada con nueva vida ♡</p>
    </nav>

    <aside>

      <h2>Categorías</h2>

      <div class="categorias">
        <p>Chaquetas (12)</p>
        <p>Sweaters (8)</p>
        <p>Vestidos (15)</p>
        <p>Denim (6)</p>
        <p>Accesorios (10)</p>
      </div>

    </aside>

    <main>
      <section class="productos">

        <div class="card">
          <img src="https://images.unsplash.com/photo-1483985988355-763728e1935b?w=500" alt="ropa">
          <h3>Blusa vintage</h3>
          <p>$8.990</p>
          <button>Comprar</button>
        </div>

        <div class="card">
          <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=500" alt="ropa">
          <h3>Polera original</h3>
          <p>$12.990</p>
          <button>Comprar</button>
        </div>

        <div class="card">
          <img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f?w=500" alt="ropa">
          <h3>Chaqueta única</h3>
          <p>$18.990</p>
          <button>Comprar</button>
        </div>

        <div class="card">
          <img src="https://images.unsplash.com/photo-1496747611176-843222e1e57c?w=500" alt="ropa">
          <h3>Vestido floreado</h3>
          <p>$10.990</p>
          <button>Comprar</button>

        </div>
      </section>
    </main>


    <footer>
      <p>@latiendadepily</p>
    </footer>

  </div>
</body>
</html>
